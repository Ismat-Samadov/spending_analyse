<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0a0a1a"/>
  <!-- Board triangles - top -->
  <polygon points="2,2 8,2 5,14" fill="#00ffe044"/>
  <polygon points="9,2 15,2 12,14" fill="#7c3aed44"/>
  <polygon points="17,2 23,2 20,14" fill="#00ffe044"/>
  <polygon points="24,2 30,2 27,14" fill="#7c3aed44"/>
  <!-- Board triangles - bottom -->
  <polygon points="2,30 8,30 5,18" fill="#7c3aed44"/>
  <polygon points="9,30 15,30 12,18" fill="#00ffe044"/>
  <polygon points="17,30 23,30 20,18" fill="#7c3aed44"/>
  <polygon points="24,30 30,30 27,18" fill="#00ffe044"/>
  <!-- White checker with neon glow -->
  <circle cx="5" cy="26" r="3.5" fill="#e0f7fa" stroke="#00ffe0" stroke-width="1"/>
  <circle cx="5" cy="26" r="2" fill="none" stroke="#00ffe088" stroke-width="0.8"/>
  <!-- Black checker with violet glow -->
  <circle cx="27" cy="6" r="3.5" fill="#1a0533" stroke="#9333ea" stroke-width="1"/>
  <circle cx="27" cy="6" r="2" fill="none" stroke="#9333ea88" stroke-width="0.8"/>
  <!-- Center bar -->
  <rect x="14.5" y="2" width="3" height="28" rx="1" fill="#0a0a18" stroke="#00ffe022" stroke-width="0.5"/>
</svg>
